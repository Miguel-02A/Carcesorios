<!doctype html>
<html>
    <head>
	     <meta charset="UTF-0">
         <meta name="description" content="Prueba B">
		 <!-- CSS only -->
         <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-Zenh87qX5JnK2Jl0vWa8Ck2rdkQ2Bzep5IDxbcnCeuOxjzrPF/et3URy9Bv1WTRi" crossorigin="anonymous">
	     <title>Prueba B</title>
	     <link rel="stylesheet" type="text/css" href="styles.css"> 
	</head>
	
	<body>

	    <div class="container">
		
		<div class="col-2">
		   <img src="Logo.jpg">
		</div>
		
		<section class="d-flex justify-content-center">
		<div class="col-6">
	    <form>
			
			<h2> Crear usuario </h2>
			
			<div class="form-group mb-2">
			    <p> Nombre </p>
		        <input type="text" class="form-control" placeholder="Nombre completo" name="username" required> 
			</div>  
			
			<div class="form-group mb-2">
			    <p> Seleccione su tipo de documento </p>
		        <select>
	                <option Value="1">Seleccione</option>
	                <option Value="2">T.I</option>
		            <option Value="3">C.C</option>
		            <option Value="4">T.E</option>
		        </select>
	        </div> 
			
            <div class="form-group mb-2">
			    <p> Digite su numero de documento </p>
		        <input type="number" class="form-control" placeholder="Documento #" name="userid" required>
		    </div> 
			
			<div class="form-group mb-2">
			    <p> Digite su correo electronico </p>
		        <input type="email" class="form-control" placeholder="Correo electronico" name="email" required>
		    </div> 
			
			
			<div class="form-group mb-2">
			    <p> Cree una nueva contrasena </p>
		        <input type="password" class="form-control" placeholder="Contrasena" name="password" required>
	     	</div> 
			
			
			<div class="form-group mb-2">
			    <p>Escriba de nuevo la contrasena </p>
		        <input type="password" class="form-control" placeholder="Repetir contrasena" name="password" required>
		    </div>
			
			<div class="form-group mb-2">
                <label for="formFileLg" class="form-label">Adjunte una copia de su documento</label>
                <input class="form-control form-control-lg" id="formFileLg" type="file">
            </div>
			
			<div class="form-group mb-2">
		        <input type="sumbit" value="Crear cuenta" class="btn btn-primary">
		    </div> 
			
		</form>

	 
		  
		
		
		
		
		
		
		
		
	    
		
		
		
	 
	
	</body>
